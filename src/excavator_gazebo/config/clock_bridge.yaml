# Clock only — keep separate from sensors so LiDAR/IMU bridge issues cannot block /clock.
# Gazebo Harmonic publishes sim time on /clock (and /world/<name>/clock); upstream ros_gz_bridge uses /clock.
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS
