# Trajectory execution for MoveIt -> arm_trajectory_controller (Gazebo / ros2_control)
# Keys under trajectory_execution become trajectory_execution.* on move_group (required in MoveIt 2).
trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 0.5
  # Sim + TOTG + body slewing: logs showed bucket/stick mismatches; body_rotation can differ by >2.5 rad
  # vs trajectory start when /joint_states and the plan use different 2π branches (revolute ±4π limits).
  allowed_start_tolerance: 6.5

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_trajectory_controller

  arm_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - body_rotation
      - boom_rotation
      - stick_rotation
      - bucket_rotation
