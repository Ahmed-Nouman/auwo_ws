controller_manager:
  ros__parameters:
    update_rate: 200  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    arm_position_controller:
      type: position_controllers/JointGroupPositionController
    arm_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_position_controller:
  ros__parameters:
    joints:
      - body_rotation
      - boom_rotation
      - stick_rotation
      - bucket_rotation
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

arm_trajectory_controller:
  ros__parameters:
    joints:
      - body_rotation
      - boom_rotation
      - stick_rotation
      - bucket_rotation
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    # MoveIt time-parameterized trajectories often end with small non-zero velocities; JTC rejects those goals otherwise.
    allow_nonzero_velocity_at_trajectory_end: true
    constraints:
      goal_time: 0.5
